<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f0eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>FIND · 财务人的16型人格</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f8f4ee 0%,#ede5d8 100%);background-attachment:fixed;color:#1a1a1a;line-height:1.6;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(184,149,106,.05) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}
.container{max-width:480px;margin:0 auto;padding:20px 20px 60px;padding:20px 20px calc(60px + env(safe-area-inset-bottom, 0px));min-height:100dvh;overscroll-behavior:contain;position:relative;z-index:1}
#app{transition:opacity .18s ease}
#app.fade-out{opacity:0}

.btn{display:inline-block;padding:15px 40px;border-radius:30px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(.25,.8,.25,1.2);background:#1a1a1a;color:#fff;letter-spacing:.5px}
.btn:active{transform:scale(.96);opacity:.85}
.btn-accent{background:#b8956a}
.btn-accent:active{background:#a6844f}
.btn.outline{background:transparent;border:1.5px solid #1a1a1a;color:#1a1a1a}
.btn.block{display:block;width:100%;text-align:center}
.btn.sm{padding:10px 20px;font-size:13px}

/* landing */
.landing{text-align:center;padding-top:80px;position:relative}
.hero-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(184,149,106,.16) 0%,transparent 60%);pointer-events:none;z-index:-1}
.landing .logo{font-size:64px;letter-spacing:10px;font-weight:900;color:#1a1a1a;margin-bottom:2px}
.landing .sub{font-size:12px;color:#bbb;margin-bottom:36px;letter-spacing:2px}
.landing .tagline{font-size:26px;font-weight:700;line-height:1.4;margin-bottom:6px}
.landing .desc{font-size:15px;color:#888;margin-bottom:32px}
.landing .info-row{display:flex;justify-content:center;gap:28px;margin-bottom:36px;font-size:13px;color:#aaa}
.landing .info-capsule{display:inline-flex;align-items:center;background:#fff;border-radius:20px;padding:8px 18px;font-size:13px;color:#999;margin-bottom:36px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.info-capsule .info-sep{width:1px;height:12px;background:#d5cdc0;margin:0 12px}
.gallery-link{font-size:13px;color:#aaa;cursor:pointer;text-decoration:none;transition:color .15s}
.gallery-link:hover{color:#666}

/* card */
.card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 1px 2px rgba(0,0,0,.02),0 4px 12px rgba(0,0,0,.04);margin-bottom:16px}
.card h1{font-size:20px;font-weight:700;margin-bottom:8px}
.card h2{font-size:17px;font-weight:600;margin-bottom:16px}

/* progress */
.progress-wrap{margin-bottom:20px}
.progress-bar{height:6px;background:#e8e2d8;border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,#1a1a1a 0%,#b8956a 100%);border-radius:3px;transition:width .4s ease}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:#aaa}

/* question */
.q-wrap{position:relative;min-height:200px}
.q-card{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 1px 2px rgba(0,0,0,.02),0 4px 12px rgba(0,0,0,.04);transition:opacity .2s,transform .2s}
.q-card.enter-right{animation:slideInRight .25s ease-out}
.q-card.enter-left{animation:slideInLeft .25s ease-out}
.q-dim-hint{font-size:11px;color:#b8956a;letter-spacing:2px;margin-bottom:8px}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.q-num{font-size:13px;color:#bbb;margin-bottom:12px}
.q-statement{font-size:18px;line-height:1.7;font-weight:500;margin-bottom:24px}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-opt{display:block;width:100%;text-align:left;padding:15px 18px;border-radius:12px;border:1.5px solid #e8e2d8;background:#faf8f5;font-size:15px;color:#2c2c2c;cursor:pointer;transition:all .15s;line-height:1.5}
.q-opt:hover{background:#f2ece0;border-color:#d5cdb8}
.q-opt:active{background:#ede5d5;border-color:#c8bfa8}
.q-opt.picked{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.q-nav{display:flex;gap:12px;margin-top:16px}
.q-nav button{flex:1}

/* result */
.result-top{text-align:center;padding:20px 0 16px}
.result-avatar{width:120px;height:120px;margin:8px auto 4px}
.result-avatar svg{width:100%;height:100%;display:block}
.result-char{font-size:15px;font-weight:700;color:#b8956a;margin:2px 0 2px;letter-spacing:1px}
.result-code{font-size:48px;font-weight:900;letter-spacing:8px;margin-bottom:0}
.result-name{font-size:16px;font-weight:600;color:#999;margin-bottom:4px}
.result-desc{font-size:15px;line-height:1.9;color:#555}
.result-spectra{margin:24px 0}
.share-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}
.result-card{padding:28px 24px;margin-bottom:16px}
.result-divider{width:40px;height:1px;background:#d5cdc0;margin:28px auto;border:none}

/* type gallery */
.types-header{text-align:center;padding:20px 0}
.types-header h1{font-size:22px;margin-bottom:4px}
.types-header p{font-size:14px;color:#888}
.types-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-cell{background:#fff;border-radius:14px;padding:20px 16px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden;border-top:3px solid var(--tc,#e8e2d8)}
.type-cell::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 130%,var(--tc,#f0ebe0) 0%,transparent 70%);opacity:.1;z-index:0;transition:opacity .2s}
.type-cell:active{transform:scale(.97)}
.type-cell:active::before{opacity:.2}
.type-cell>*{position:relative;z-index:1}
.type-cell .t-code{font-size:11px;color:#bbb;letter-spacing:2px;margin-bottom:6px}
.type-cell .t-name{font-size:16px;font-weight:700;margin-bottom:6px}
.t-avatar{width:96px;height:96px;margin:0 auto 2px}
.t-avatar svg{width:100%;height:100%;display:block}
.t-char{font-size:12px;font-weight:700;margin-bottom:2px;letter-spacing:1px}

/* related types */
.related{margin-top:28px}
.related-title{font-size:11px;color:#bbb;margin-bottom:14px;text-align:center;letter-spacing:3px;text-transform:uppercase}
.related-list{display:flex;gap:10px}
.related-item{flex:1;background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:all .12s;text-decoration:none;color:inherit;display:block}
.related-item:active{transform:scale(.96)}
.related-item .r-code{font-size:10px;color:#bbb;margin-bottom:2px}
.related-item .r-name{font-size:13px;font-weight:600}

/* detail page */
.detail-dims{margin:24px 0}
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px}
.dim-row .d-code{font-weight:800;font-size:18px;width:24px;text-align:center}
.dim-row .d-label{color:#888;min-width:40px;font-size:12px}
.dim-row .d-track{flex:1;position:relative;height:28px;display:flex;align-items:center}
.dim-row .d-line{position:absolute;left:0;right:0;height:2px;background:#e8e2d8}
.dim-row .d-dot{width:12px;height:12px;border-radius:50%;background:#1a1a1a;position:relative;z-index:1;box-shadow:0 0 0 4px rgba(26,26,26,.06)}

/* nav */
.nav-back{display:flex;align-items:center;gap:4px;font-size:14px;color:#888;cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0}
.nav-back:active{color:#1a1a1a}

/* share modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-content{background:#fff;border-radius:16px;padding:20px;max-width:320px;width:100%;text-align:center}
.modal-content img{width:100%;border-radius:8px;margin-bottom:12px}
.modal-close{margin-top:12px}

/* type peek modal */
.tmodal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.tmodal-card{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:tmodalIn .2s ease-out}
@keyframes tmodalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes tmodalOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.96)}}
.tmodal.close{animation:tmodalOut .12s ease-in forwards}
.tmodal.close .tmodal-card{animation:tmodalOut .12s ease-in forwards}
.tmodal-close{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.05);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;transition:all .15s;line-height:1}
.tmodal-close:hover{background:rgba(0,0,0,.1);color:#333}
.tmodal-card .result-code{font-size:40px}
.tmodal-card .result-avatar{width:100px;height:100px;margin:4px auto}
.tmodal-card .result-char{font-size:13px}
.tmodal-card .result-tagline{font-size:14px}
.tmodal-card .result-code{font-size:38px;letter-spacing:6px}
.tmodal-card .result-desc{font-size:14px}

/* footer */
.footer{text-align:center;font-size:11px;color:#ccc;padding:24px 0;margin-top:32px}

.disclaimer{font-size:12px;color:#ccc;text-align:center;margin-top:32px}

/* toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

.hidden{display:none!important}

/* result redesign */
.result-divider{width:40px;height:1px;background:#d5cdc0;margin:28px auto;border:none}
.result-section-title{font-size:11px;color:#aaa;text-align:center;margin:32px 0 16px;letter-spacing:4px;text-transform:uppercase}
.result-tagline{font-size:15px;color:#666;text-align:center;margin:8px 0 24px;line-height:1.8;font-style:italic}
.dim-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:12px;border-left:3px solid #b8956a;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.dim-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dim-card-label{font-size:13px;font-weight:600;color:#1a1a1a}
.dim-card-letter{font-size:22px;font-weight:900;letter-spacing:1px;color:#b8956a}
.dim-track{position:relative;height:6px;margin-bottom:6px;background:#e8e2d8;border-radius:3px}
.dim-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#b8956a 0%,#d4bc8c 100%);border-radius:3px;transition:width .3s ease}
.dim-dot{position:absolute;top:50%;width:14px;height:14px;background:#b8956a;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 4px rgba(184,149,106,.12);z-index:2}
.dim-labels{display:flex;justify-content:space-between;font-size:12px;color:#bbb;margin-bottom:10px}
.dim-labels .l-active{color:#1a1a1a;font-weight:700}
.dim-insight{font-size:13px;color:#666;line-height:1.6;background:#f8f5f0;border-radius:8px;padding:10px 12px}

@media(max-width:380px){
  .q-statement{font-size:16px}
  .result-code{font-size:28px}
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const QUESTIONS = [
  { id:1,  dim:0, q:"我属于那种每一步都知道自己往哪走的人。", a:"是的", b:"差不多", c:"不太是" },
  { id:2,  dim:0, q:"面试官问职业规划——我不慌，心里是有方向的。", a:"是的", b:"有点方向", c:"不太有" },
  { id:3,  dim:0, q:"我的职业经历能串成一条比较清楚的线。", a:"能", b:"部分能", c:"不太能" },
  { id:4,  dim:0, q:"我的简历一看就有比较明确的主线。", a:"有", b:"有一点", c:"不太有" },
  { id:5,  dim:0, q:"我换工作之前一般都想清楚了为什么要换。", a:"是的", b:"有时候", c:"换完了才想" },
  { id:6,  dim:0, q:"方向这件事上，我算是搞清楚了的。", a:"是的", b:"大概有", c:"还在找" },
  { id:7,  dim:0, q:"三五年后想做什么——这个问题难不倒我。", a:"难不倒", b:"能说一点", c:"难" },
  { id:8,  dim:0, q:"我的职业路径更像：一条有方向的河，不是到处分叉的树。", a:"更像河", b:"介于两者", c:"更像树" },
  { id:9,  dim:1, q:"新的机会出现，我一般是那个先举手的人。", a:"是的", b:"看情况", c:"一般不会" },
  { id:10, dim:1, q:"「这事一定能成」——听到这话我会先兴奋，不是先怀疑。", a:"先兴奋", b:"一半一半", c:"先怀疑" },
  { id:11, dim:1, q:"裸辞这件事，我做得出来。", a:"做得出来", b:"看存款", c:"做不到" },
  { id:12, dim:1, q:"回头看，没做的事比做了的事更让我惦记。", a:"没做的更惦记", b:"差不多", c:"做了的更后悔" },
  { id:13, dim:1, q:"在一个地方待十二年——想想就觉得该换换了。", a:"待不住", b:"地方好也许可以", c:"我可以" },
  { id:14, dim:1, q:"被调到陌生业务线，我先看有什么新机会。", a:"先看机会", b:"一边确认一边看", c:"先确认安全" },
  { id:15, dim:1, q:"「太稳定」这件事会让我有点慌。", a:"会的", b:"有一点", c:"不会" },
  { id:16, dim:1, q:"「试一下又不会死」——这话我是信的。", a:"信的", b:"分情况", c:"不信" },
  { id:17, dim:2, q:"我习惯先把事情想清楚，再动手。", a:"是的", b:"看什么事", c:"先动再说" },
  { id:18, dim:2, q:"一封邮件发出去之前，我一般会再看一遍。", a:"会的", b:"偶尔", c:"不会" },
  { id:19, dim:2, q:"临时被叫去做决定——我会觉得不太舒服。", a:"不舒服", b:"看什么事", c:"还好" },
  { id:20, dim:2, q:"别人已经跳到下一个话题了，我还在想上一个。", a:"经常这样", b:"偶尔", c:"不会" },
  { id:21, dim:2, q:"做了决定之后，我会忍不住复盘有没有漏洞。", a:"会的", b:"偶尔", c:"不太会" },
  { id:22, dim:2, q:"我的问题不是方向错了，是想太久了。", a:"想太久是卡点", b:"有时候", c:"不是" },
  { id:23, dim:2, q:"「先开枪再瞄准」——这种事我干不出来。", a:"干不出来", b:"偶尔可以", c:"我就是这样的" },
  { id:24, dim:2, q:"十次讨论里，我大多是先听完，最后才开口的那个。", a:"是的", b:"一半一半", c:"不是" },
  { id:25, dim:3, q:"我有一个能拿得出手的专长方向。", a:"有", b:"有一点", c:"什么都会一点" },
  { id:26, dim:3, q:"部门里一个难题卡住了，最后我能解决——这种事发生过。", a:"不止一次", b:"一两次", c:"不太有" },
  { id:27, dim:3, q:"我不太担心简历上体现不出价值，因为方向比较聚焦。", a:"是的", b:"有点担心", c:"挺担心的" },
  { id:28, dim:3, q:"有些东西不是新同事三个月就能接手的。", a:"是的", b:"部分能部分不能", c:"大部分都能" },
  { id:29, dim:3, q:"我的价值更多体现在深度上，不是广度上。", a:"更多是深度", b:"一半一半", c:"更多是广度" },
  { id:30, dim:3, q:"「你的核心竞争力是什么」——这个问题我能比较快地说出来。", a:"能", b:"想一下能", c:"不太好说" },
  { id:31, dim:3, q:"有一两件事，我知道自己是部门里做得最好的。", a:"有", b:"可能有一两件", c:"不太有" },
  { id:32, dim:3, q:"用一句话形容我的能力——像一个钉子，不是一块板子。", a:"更像钉子", b:"介于两者", c:"更像板子" },
];

const TYPES = {
  'L-D-R-T':{name:'谋定后动型',character:'暗中观察',tagline:'等我算完，答案自然就有了。',desc:'开会沉默到最后，想法还在后台跑计算。弹出结果时已经散会了，只好私发组长。组长回了一句：下次早点。'},
  'L-D-R-E':{name:'一击必中型',character:'我先来',tagline:'先干了再说，改总比不动强。',desc:'新任务丢过来他第一个点头。不是最有把握，是受不了讨论停在"要不要做"。方案细节不够多但方向没偏过。改是要改的，至少不用再讨论开不开会了。'},
  'L-D-S-T':{name:'稳中求进型',character:'三遍怪',tagline:'你可以催我，但别想让我出错。',desc:'邮件发出去之前看三遍。第一遍看事实，第二遍看语气，第三遍其实和第二遍差不多但他就是忍不住。最后一个回复的人，也是唯一没被追问过"你确认过吗"的人。'},
  'L-D-S-E':{name:'稳中求变型',character:'八爪章鱼',tagline:'换个地方，接着做我擅长的事。',desc:'三年换三个部门。新同事问他之前做什么，说完对方愣了一秒——听起来和现在干的差不多。他笑了笑说对，我就是换个楼层接着做一样的事。'},
  'L-B-R-T':{name:'蓝图待建型',character:'画梦人',tagline:'方案可以更好，先别急着执行。',desc:'立项期最出彩的人，框架漂亮时间线清晰。大家鼓掌。然后他花了两周调框架细节。第三周别人问进展，他说已经到第四版了——第一版还没执行。'},
  'L-B-R-E':{name:'逢山开路型',character:'平头哥',tagline:'不会？下周我就会了。',desc:'不会的事从来不先承认不会。接完两周疯狂补习到能培训别人。同事觉得他什么都会。他自己知道——会的有一半是上周二学的。'},
  'L-B-S-T':{name:'步步为营型',character:'水獭',tagline:'你看最后一页就好，我每一页都对了。',desc:'任何汇报都准备三版：完整版、摘要版、一分钟版。领导只看最后一页。但他在意的是——那一页也是对的。'},

function getRelated(code) {
  const parts = code.split('-');
  const allCodes = Object.keys(TYPES);
  const related = allCodes.filter(c => {
    if (c === code) return false;
    const cp = c.split('-');
    let diffs = 0;
    for (let i = 0; i < 4; i++) if (cp[i] !== parts[i]) diffs++;
    return diffs === 1;
  });
  // shuffle and take 3
  for (let i = related.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [related[i], related[j]] = [related[j], related[i]];
  }
  return related.slice(0, 3);
}

let answers = {};
let shuffled = [];
let currentQIdx = 0;
let currentCode = null;
let lastRenderedQIdx = -1;
let slideDir = 'right';
let resumeTest = false;
let autoAdvTimer = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTest() {
  shuffled = shuffle(QUESTIONS);
  answers = {};
  shuffled.forEach(q => answers[q.id] = -1);
  currentQIdx = 0;
  lastRenderedQIdx = -1;
  slideDir = 'right';
}

function getScore(dimIdx) {
  let s = 0;
  shuffled.forEach(q => {
    if (q.dim !== dimIdx) return;
    const a = answers[q.id];
    if (a === 0) s += 1;
    else if (a === 2) s -= 1;
  });
  return s;
}

function getCode() {
  const parts = CODE_ORDER.map(d => {
    const s = getScore(d);
    const di = DIMS[d];
    return s > 0 ? di.left : s < 0 ? di.right : (Math.random() < 0.5 ? di.left : di.right);
  });
  return parts.join('-');
}

// Derive scores from code when no test data (for direct URL visits)
function getScoresFromCode(code) {
  const parts = code.split('-');
  const dimOrder = [0, 3, 1, 2];
  const scores = [0, 0, 0, 0];
  dimOrder.forEach((d, i) => {
    const di = DIMS[d];
    const letter = parts[i];
    scores[d] = letter === di.left ? 6 : -6;
  });
  return scores;
}

function hasTestData() {
  return shuffled.length > 0 && Object.values(answers).some(v => v >= 0);
}

// helpers for canvas share card
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lh) {
  const chars = text.split('');
  let line = '', py = y;
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, x, py);
      line = chars[i];
      py += lh;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, py);
}

function drawFace(ctx, color, cx, cy, r, char) {
  const dk = '#1a1a1a';
  // outer ring
  ctx.fillStyle = color; ctx.globalAlpha = .06;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // face
  ctx.fillStyle = '#fbf7f2'; ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(cx, cy-4, r*.55, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // eyes — vary by character
  const ex = r*.22, ey = cy-12;
  ctx.fillStyle = dk;
  if (char==='暗中观察') {
    ctx.beginPath(); ctx.arc(cx-ex, ey-2, r*.18, 0, Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+ex, ey-2, r*.18, 0, Math.PI); ctx.stroke();
    ctx.fillStyle = color; ctx.beginPath(); ctx.arc(cx-ex, ey+2, r*.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ex, ey+2, r*.1, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(cx-ex, ey, r*.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+ex, ey, r*.08, 0, Math.PI*2); ctx.fill();
  }

  // mouth
  ctx.strokeStyle = dk; ctx.lineWidth = 2; ctx.lineCap = 'round';
  const my = cy+r*.14;
  if (char==='平头哥'||char==='浪里白'||char==='愣头青')
    ctx.stroke(new Path2D('M'+(cx-r*.12)+' '+(my-2)+' L'+(cx-r*.04)+' '+my+' L'+cx+' '+(my-4)+' L'+(cx+r*.04)+' '+my+' L'+(cx+r*.12)+' '+(my-2)));
  else if (char==='扫地僧'||char==='卧龙'||char==='搬砖王')
    ctx.stroke(new Path2D('M'+(cx-r*.06)+' '+my+' Q'+cx+' '+(my+r*.04)+' '+(cx+r*.06)+' '+my));
  else
    ctx.stroke(new Path2D('M'+(cx-r*.06)+' '+my+' Q'+cx+' '+(my+r*.08)+' '+(cx+r*.06)+' '+my+''));

  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════
// CANVAS SHARE CARD
// ═══════════════════════════════════════════
function generateShareImage(code) {
  const t = TYPES[code];
  const color = TYPE_COLORS[code];
  const dimOrder = [0, 3, 1, 2];
  const parts = code.split('-');
  const scores = hasTestData() ? dimOrder.map(d => getScore(d)) : getScoresFromCode(code);

  const dpr = window.devicePixelRatio || 1;
  const W = 600, H = 800;
  const canvas = document.createElement('canvas');
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // bg — match page style
  ctx.fillStyle = '#f8f4ee';
  ctx.fillRect(0, 0, W, H);

  // top accent bar
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, W, 4);

  // brand
  ctx.fillStyle = '#999';
  ctx.font = '12px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('FIND · 财务人 16 型人格', W/2, 40);

  // character avatar face
  drawFace(ctx, color, W/2, 96, 80, t.character);

  // type code — below avatar
  ctx.font = '900 42px -apple-system, "PingFang SC", sans-serif';
  const step = 40, tw = parts.length * step, sx = (W - tw) / 2 + step / 2;
  parts.forEach((l, i) => {
    ctx.fillStyle = color;
    ctx.fillText(l, sx + i * step, 170);
  });

  // separator dots
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  for (let i = 0; i < parts.length - 1; i++) {
    ctx.beginPath();
    ctx.arc(sx + i * step + step / 2, 162, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // type name + tagline
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 22px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText(t.name, W/2, 208);
  ctx.fillStyle = '#888';
  ctx.font = 'italic 14px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText('「' + t.tagline + '」', W/2, 234);

  // desc card
  ctx.fillStyle = '#fff';
  roundRect(ctx, 36, 256, W - 72, 100, 14);
  ctx.fill();
  ctx.fillStyle = '#666';
  ctx.font = '14px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  wrapText(ctx, t.desc, W/2, 282, W - 100, 23);

  // dimensions
  const dimY = 384;
  dimOrder.forEach((d, idx) => {
    const di = DIMS[d];
    const letter = parts[idx];
    const isLeft = letter === di.left;
    const sc = scores[idx];
    const pct = Math.round((8 - Math.max(-8, Math.min(8, sc))) / 16 * 100);
    const y = dimY + idx * 68;

    ctx.fillStyle = '#bbb';
    ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(di.label, W/2, y);

    ctx.fillStyle = isLeft ? color : '#bbb';
    ctx.font = 'bold 12px -apple-system, "PingFang SC", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${di.left} ${di.ln}`, 110, y + 24);

    ctx.fillStyle = isLeft ? '#bbb' : color;
    ctx.textAlign = 'left';
    ctx.fillText(`${di.rn} ${di.right}`, W - 110, y + 24);

    ctx.fillStyle = '#e8e2d8';
    roundRect(ctx, 130, y + 16, W - 260, 4, 2);
    ctx.fill();

    ctx.fillStyle = color;
    roundRect(ctx, 130, y + 16, (W - 260) * pct / 100, 4, 2);
    ctx.fill();
  });

  // footer
  ctx.fillStyle = '#bbb';
  ctx.font = '12px -apple-system, "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('搜索「财务人 16 型人格」即可测试', W/2, H - 30);

  // bottom accent bar
  ctx.fillStyle = color;
  ctx.fillRect(0, H - 4, W, 4);

  return canvas.toDataURL('image/png');
}

function route() {
  const hash = location.hash.slice(1) || '/';
  window.scrollTo(0, 0);
  const app = document.getElementById('app');

  if (hash === '/' || hash === '') renderLanding();
  else if (hash === '/about') renderAbout();
  else if (hash === '/test') renderTest();
  else if (hash.startsWith('/result/')) {
    currentCode = hash.split('/')[2];
    renderResult(currentCode);
  }
  else if (hash === '/types') renderTypeGallery();
  else if (hash.startsWith('/types/')) {
    currentCode = hash.split('/')[2];
    renderTypeDetail(currentCode);
  }
  else renderLanding();

  setTimeout(() => { app.classList.remove('fade-out'); }, 40);
}

  const total = shuffled.length;
  const idx = currentQIdx;
  const q = shuffled[idx];
  const done = Object.values(answers).filter(v => v >= 0).length;
  const pct = Math.round((idx + 1) / total * 100);
  const ans = answers[q.id];
  const isNew = idx !== lastRenderedQIdx;
  const enterClass = isNew ? `enter-${slideDir}` : '';
  lastRenderedQIdx = idx;

  let html = '';
  html += `<button class="nav-back" onclick="clearTimeout(autoAdvTimer);navigate('/')">← 返回首页</button>`;
  html += `<div class="progress-wrap">`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  html += `<div class="progress-info"><span>第 ${idx+1}/${total} 题</span><span>${done} 题已答</span></div>`;
  html += `</div>`;

  html += `<div class="q-wrap"><div class="q-card ${enterClass}" id="qcard">`;
  html += `<div class="q-num">Q${idx+1} · ${DIMS[q.dim].label}</div>`;
  html += `<div class="q-statement">${q.q}</div>`;
  html += `<div class="q-options">`;
  const opts = [{label:'A',text:q.a},{label:'B',text:q.b},{label:'C',text:q.c}];
  opts.forEach((o, oi) => {
    const picked = ans === oi ? ' picked' : '';
    html += `<button class="q-opt${picked}" onclick="pickAnswer(${q.id},${oi})">${o.label}. ${o.text}</button>`;
  });
  html += `</div></div></div>`;

  html += `<div class="q-nav">`;
  if (idx > 0) html += `<button class="btn outline" onclick="prevQ()">← 上一题</button>`;
  if (idx < total - 1) {
    html += `<button class="btn" onclick="nextQ()" ${ans < 0 ? 'disabled style="opacity:.4;pointer-events:none"' : ''}>下一题 →</button>`;
  } else {
    html += `<button class="btn" onclick="finishTest()" ${done < total ? 'disabled style="opacity:.4;pointer-events:none"' : ''}>查看结果</button>`;
  }
  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

function pickAnswer(qid, val) {
  answers[qid] = val;
  renderQuestion();
  clearTimeout(autoAdvTimer);
  if (currentQIdx < shuffled.length - 1) {
    autoAdvTimer = setTimeout(() => {
      currentQIdx++;
      slideDir = 'right';
      renderQuestion();
      window.scrollTo(0, 0);
    }, 400);
  }
}

function prevQ() {
  if (currentQIdx > 0) { clearTimeout(autoAdvTimer); currentQIdx--; slideDir = 'left'; renderQuestion(); window.scrollTo(0, 0); }
}

function nextQ() {
  if (currentQIdx < shuffled.length - 1) { clearTimeout(autoAdvTimer); currentQIdx++; slideDir = 'right'; renderQuestion(); window.scrollTo(0, 0); }
}

function finishTest() {
  const code = getCode();
  navigate('/result/' + code);
}

// ═══════════════════════════════════════════
// RESULT PAGE
// ═══════════════════════════════════════════
function renderResultDimensions(scores) {
  const order = [0, 3, 1, 2];
  let h = '';
  order.forEach(d => {
    const sc = scores[d];
    const di = DIM_INSIGHTS[d];
    const isLeft = sc >= 0;
    const side = isLeft ? di.left : di.right;
    const other = isLeft ? di.right : di.left;
    const pct = Math.round((8 - Math.max(-8, Math.min(8, sc))) / 16 * 100);

    h += '<div class="dim-card">';
    h += '<div class="dim-card-header">';
    h += `<span class="dim-card-label">${di.label}</span>`;
    h += `<span class="dim-card-letter">${side.code}</span>`;
    h += '</div>';
    h += '<div class="dim-track">';
    h += `<div class="dim-fill" style="width:${pct}%"></div>`;
    h += `<div class="dim-dot" style="left:${pct}%"></div>`;
    h += '</div>';
    h += '<div class="dim-labels">';
    h += `<span class="l-active">${side.code} ${side.name}</span>`;
    h += `<span>${other.code} ${other.name}</span>`;
    h += '</div>';
    h += `<div class="dim-insight">${side.insight}</div>`;
    h += '</div>';
  });
  return h;
}

function renderResult(code) {
  const t = TYPES[code];
  if (!t) { renderLanding(); return; }
  const dimOrder = [0, 3, 1, 2];
  const scores = hasTestData() ? dimOrder.map(d => getScore(d)) : getScoresFromCode(code);
  const parts = code.split('-');

  const related = getRelated(code);
  let relHTML = '';
  related.forEach(r => {
    const rt = TYPES[r];
    relHTML += `<a class="related-item" onclick="showTypeModal('${r}')"><div class="r-code">${r}</div><div class="r-name">${rt.name}</div></a>`;
  });

  document.getElementById('app').innerHTML = `
    <button class="nav-back" onclick="resumeTest=true;navigate('/test')">← 返回修改</button>
    <div class="result-card">
      <div class="result-top">
        <div class="result-code" style="color:${TYPE_COLORS[code]}">${code}</div>
        <div class="result-avatar">${avatarSVG(code)}</div>
        <div class="result-char">${t.character}</div>
        <div class="result-name">${t.name}</div>
        <div class="result-tagline">「${t.tagline}」</div>
      </div>
      <div class="result-desc">${t.desc}</div>
      <hr class="result-divider">
      <div class="result-section-title">— 维度画像 —</div>
      <div class="result-spectra">${renderResultDimensions(scores)}</div>
      <div class="share-actions">
        <button class="btn btn-accent block" onclick="shareResult('${code}')">分享结果</button>
        <button class="btn outline block" onclick="resumeTest=false;navigate('/test')">重新测试</button>
      </div>
      ${related.length ? `<div class="related"><div class="related-title">你也可能是</div><div class="related-list">${relHTML}</div></div>` : ''}
    </div>
    <div class="disclaimer">FIND · 财务人的16型人格 · 仅供娱乐</div>`;
}

function shareResult(code) {
  try {
    const dataUrl = generateShareImage(code);
    // show in modal
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-content">
      <img src="${dataUrl}" alt="share card">
      <p style="font-size:13px;color:#888;margin-bottom:8px">长按图片保存，分享给朋友</p>
      <button class="btn sm outline modal-close" onclick="this.closest('.modal-overlay').remove()">关闭</button>
    </div>`;
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
    document.body.appendChild(overlay);
  } catch(e) {
    const t = TYPES[code];
    const text = `FIND · 财务人16型人格\n${code} ${t.name}\n${t.desc}`;
    if (navigator.share) {
      navigator.share({ title:'FIND · 财务人的16型人格', text });
    } else {
      navigator.clipboard.writeText(text).then(() => toast('已复制，去分享吧！'));
    }
  }
}

// ═══════════════════════════════════════════
// TYPE GALLERY
// ═══════════════════════════════════════════
function renderTypeGallery() {
  const all = Object.entries(TYPES);
  let gridHTML = '';
  all.forEach(([code, t]) => {
    gridHTML += `<a class="type-cell" style="--tc:${TYPE_COLORS[code]}" onclick="navigate('/types/${code}')"><div class="t-code">${code}</div><div class="t-avatar">${avatarSVG(code)}</div><div class="t-char" style="color:${TYPE_COLORS[code]}">${t.character}</div><div class="t-name">${t.name}</div></a>`;
  });

  document.getElementById('app').innerHTML = `
    <button class="nav-back" onclick="navigate('/')">← 返回首页</button>
    <div class="types-header"><h1>16 型人格图鉴</h1><p>点击查看详情</p></div>
    <div class="types-grid">${gridHTML}</div>
    <div class="footer">FIND · 财务人的16型人格 · 仅供娱乐</div>`;
}

// ═══════════════════════════════════════════
// TYPE DETAIL
// ═══════════════════════════════════════════
function renderTypeDetail(code) {
  const t = TYPES[code];
  if (!t) { renderTypeGallery(); return; }
  const dimOrder = [0, 3, 1, 2];
  const parts = code.split('-');
  // For detail page, each dim uses the letter from the code to position the dot
  // Left letter = dot at 3/16, Right letter = dot at 13/16
  const related = getRelated(code);
  let relHTML = '';
  related.forEach(r => {
    const rt = TYPES[r];
    relHTML += `<a class="related-item" onclick="showTypeModal('${r}')"><div class="r-code">${r}</div><div class="r-name">${rt.name}</div></a>`;
  });

  let dimsHTML = '';
  dimOrder.forEach((d, i) => {
    const di = DIMS[d];
    const letter = parts[i];
    const isLeft = letter === di.left;
    const pos = isLeft ? 3 : 13;
    dimsHTML += `<div class="dim-row">
      <span class="d-code" style="color:${DIM_COLORS[letter]}">${letter}</span><span class="d-label">${di.label}</span>
      <div class="d-track"><div class="d-line"></div><div class="d-dot" style="position:absolute;left:${(pos/16*100).toFixed(0)}%;transform:translateX(-50%);z-index:1;background:${DIM_COLORS[letter]}"></div></div>
    </div>`;
  });

  document.getElementById('app').innerHTML = `
    <button class="nav-back" onclick="navigate('/types')">← 返回图鉴</button>
    <div class="result-card">
      <div class="result-top">
        <div class="result-code" style="color:${TYPE_COLORS[code]}">${code}</div>
        <div class="result-avatar">${avatarSVG(code)}</div>
        <div class="result-char">${t.character}</div>
        <div class="result-name">${t.name}</div>
        <div class="result-tagline">「${t.tagline}」</div>
      </div>
      <div class="result-desc">${t.desc}</div>
      <hr class="result-divider">
      <div class="detail-dims"><div class="result-section-title">— 维度画像 —</div>${dimsHTML}</div>
      <div style="margin-top:20px">
        <button class="btn btn-accent block" onclick="navigate('/test')">开始测试 →</button>
      </div>
      ${related.length ? `<div class="related"><div class="related-title">你也可能是</div><div class="related-list">${relHTML}</div></div>` : ''}
    </div>
    <div class="disclaimer">FIND · 财务人的16型人格 · 仅供娱乐</div>`;
}

function showTypeModal(code) {
  const t = TYPES[code];
  if (!t) return;
  const parts = code.split('-');
  let dimsHTML = '';
  [0, 3, 1, 2].forEach((d, i) => {
    const di = DIMS[d];
    const letter = parts[i];
    const isLeft = letter === di.left;
    const pos = isLeft ? 3 : 13;
    dimsHTML += '<div class="dim-row">';
    dimsHTML += `<span class="d-code" style="color:${DIM_COLORS[letter]}">${letter}</span>`;
    dimsHTML += `<span class="d-label">${di.label}</span>`;
    dimsHTML += `<div class="d-track"><div class="d-line"></div><div class="d-dot" style="position:absolute;left:${(pos/16*100).toFixed(0)}%;transform:translateX(-50%);z-index:1;background:${DIM_COLORS[letter]}"></div></div>`;
    dimsHTML += '</div>';
  });
  const overlay = document.createElement('div');
  overlay.className = 'tmodal';
  overlay.onclick = function(e) { if (e.target === overlay) { overlay.classList.add('close'); setTimeout(() => overlay.remove(), 150); } };
  overlay.innerHTML = `<div class="tmodal-card">
    <button class="tmodal-close" onclick="var m=this.closest('.tmodal');m.classList.add('close');setTimeout(()=>m.remove(),150)">×</button>
    <div class="result-top">
      <div class="result-code" style="color:${TYPE_COLORS[code]}">${code}</div>
      <div class="result-avatar">${avatarSVG(code)}</div>
      <div class="result-char">${t.character}</div>
      <div class="result-name">${t.name}</div>
      <div class="result-tagline">「${t.tagline}」</div>
    </div>
    <div class="result-desc">${t.desc}</div>
    <hr class="result-divider">
    <div class="result-section-title">— 维度画像 —</div>
    ${dimsHTML}
  </div>`;
  document.body.appendChild(overlay);
}
